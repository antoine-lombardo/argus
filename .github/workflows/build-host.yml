name: Build host app

on:
  push:
    tags:
      - 'argus@*'
  workflow_dispatch:
    inputs:
      platform:
        description: Platform to build
        required: true
        default: all
        type: choice
        options:
          - all
          - android
          - ios
      profile:
        description: EAS build profile
        required: true
        default: preview_tv
        type: choice
        options:
          - preview_tv
          - staging_tv
          - production_tv
      submit_to_stores:
        description: Submit to store internal/production tracks (staging_tv → TestFlight internal + Play internal; production_tv → production)
        required: true
        default: false
        type: boolean

concurrency:
  group: build-host-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: android
            label: Android TV
          - platform: ios
            label: tvOS
    steps:
      - name: Skip matrix row
        id: skip
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && \
                "${{ inputs.platform }}" != "all" && \
                "${{ inputs.platform }}" != "${{ matrix.platform }}" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve build profile and artifact name
        if: steps.skip.outputs.skip != 'true'
        id: meta
        env:
          DISPATCH_PROFILE: ${{ github.event_name == 'workflow_dispatch' && inputs.profile || 'preview_tv' }}
        run: |
          PROFILE="$DISPATCH_PROFILE"
          PLATFORM="${{ matrix.platform }}"

          if [[ "$PLATFORM" == "android" ]]; then
            if [[ "$PROFILE" == "staging_tv" || "$PROFILE" == "production_tv" ]]; then
              echo "artifact=argus-android-tv.aab" >> "$GITHUB_OUTPUT"
            else
              echo "artifact=argus-android-tv.apk" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "artifact=argus-tvos.ipa" >> "$GITHUB_OUTPUT"
          fi

          echo "profile=$PROFILE" >> "$GITHUB_OUTPUT"

          case "$PROFILE" in
            staging_tv) echo "submit_profile=staging" >> "$GITHUB_OUTPUT" ;;
            production_tv) echo "submit_profile=production" >> "$GITHUB_OUTPUT" ;;
            *) echo "submit_profile=" >> "$GITHUB_OUTPUT" ;;
          esac

      - uses: actions/checkout@v7
        if: steps.skip.outputs.skip != 'true'
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v7
        if: steps.skip.outputs.skip != 'true'
        with:
          node-version: 22
          cache: npm

      - uses: expo/expo-github-action@v8
        if: steps.skip.outputs.skip != 'true'
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        if: steps.skip.outputs.skip != 'true'
        run: npm ci

      - name: EAS build
        if: steps.skip.outputs.skip != 'true'
        run: |
          set -o pipefail
          eas build \
            --platform ${{ matrix.platform }} \
            --profile "${{ steps.meta.outputs.profile }}" \
            --non-interactive \
            --wait \
            --json | tee "build-${{ matrix.platform }}.json"

      - name: Resolve artifact URL
        if: steps.skip.outputs.skip != 'true'
        id: resolve
        run: |
          node <<'NODE'
          const fs = require('fs');
          const platform = '${{ matrix.platform }}';
          const raw = fs.readFileSync(`build-${platform}.json`, 'utf8').trim();
          const parsed = JSON.parse(raw);
          const build = Array.isArray(parsed) ? parsed[0] : parsed;
          const url =
            build?.artifacts?.applicationArchiveUrl ||
            build?.artifacts?.buildUrl ||
            build?.artifacts?.url;
          if (!url) {
            console.error(`No artifact URL for ${platform}:`);
            console.error(JSON.stringify(build, null, 2));
            process.exit(1);
          }
          const out = process.env.GITHUB_OUTPUT;
          fs.appendFileSync(out, `artifact_url=${url}\n`);
          NODE

      - name: Download build artifact
        if: steps.skip.outputs.skip != 'true'
        run: curl -fSL --retry 3 --retry-delay 5 -o "${{ steps.meta.outputs.artifact }}" "${{ steps.resolve.outputs.artifact_url }}"

      - name: Upload workflow artifact
        if: steps.skip.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.artifact }}
          path: ${{ steps.meta.outputs.artifact }}
          retention-days: 30

      # Android submits via EAS. tvOS is handled by the `submit-tvos` job below,
      # because `eas submit -p ios` delivers the Apple TV build as iOS and Apple
      # rejects it (ITMS-90508/90545/90713/90039). See docs/PACKAGING.md.
      - name: Submit Android to Play track
        if: >-
          steps.skip.outputs.skip != 'true' &&
          matrix.platform == 'android' &&
          github.event_name == 'workflow_dispatch' &&
          inputs.submit_to_stores &&
          steps.meta.outputs.submit_profile != ''
        run: |
          eas submit \
            --platform android \
            --profile "${{ steps.meta.outputs.submit_profile }}" \
            --latest \
            --non-interactive \
            --wait

  # tvOS delivery must declare the appletvos platform, which `eas submit` cannot
  # do. Upload the IPA artifact from the build job with `xcrun altool
  # -t appletvos` on a macOS runner instead.
  submit-tvos:
    name: Submit tvOS (altool)
    needs: build
    if: >-
      github.event_name == 'workflow_dispatch' &&
      inputs.submit_to_stores &&
      (inputs.platform == 'all' || inputs.platform == 'ios') &&
      (inputs.profile == 'staging_tv' || inputs.profile == 'production_tv')
    runs-on: macos-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: argus-tvos.ipa

      - name: Write App Store Connect API key
        env:
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
        run: |
          mkdir -p ~/private_keys
          printf '%s' "$ASC_API_KEY_P8" > "$HOME/private_keys/AuthKey_${ASC_API_KEY_ID}.p8"

      - name: Upload to App Store Connect (tvOS)
        env:
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
        run: |
          set -o pipefail
          xcrun altool --upload-app \
            -f argus-tvos.ipa \
            -t appletvos \
            --apiKey "$ASC_API_KEY_ID" \
            --apiIssuer "$ASC_API_ISSUER_ID" 2>&1 | tee altool-upload.log
          grep -q "No errors uploading" altool-upload.log

  release:
    name: GitHub Release assets
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: argus-*
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            argus-android-tv.apk
            argus-android-tv.aab
            argus-tvos.ipa
          fail_on_unmatched_files: false
          make_latest: true
