name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout argus
        uses: actions/checkout@v7
        with:
          path: argus

      - name: Checkout argus-plugin-sdk (file: dependency)
        uses: actions/checkout@v7
        with:
          repository: antoine-lombardo/argus-plugin-sdk
          path: argus-plugin-sdk

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: argus/package-lock.json

      - name: Install and verify
        working-directory: argus
        run: |
          npm ci
          npm run typecheck
          npm run lint
